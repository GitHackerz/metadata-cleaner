name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---------------------------------------------------------------------------
  # Format check
  # ---------------------------------------------------------------------------
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Linting
  # ---------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux GUI)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev libwayland-client0 \
            libegl1-mesa-dev libgl1-mesa-dev \
            mesa-common-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - run: cargo clippy --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev \
            libegl1-mesa-dev libgl1-mesa-dev \
            mesa-common-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Install ExifTool (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libimage-exiftool-perl
      - name: Install ExifTool (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install exiftool
      - name: Install ExifTool (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install exiftool -y
      - run: cargo test --all

  # ---------------------------------------------------------------------------
  # Security audit
  # ---------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --quiet
      - run: cargo audit

  # ---------------------------------------------------------------------------
  # Release build (on tags)
  # ---------------------------------------------------------------------------
  release:
    name: Release (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [fmt, clippy, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: metadata-cleaner-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: metadata-cleaner-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: metadata-cleaner-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: metadata-cleaner-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxkbcommon-dev libwayland-dev \
            libegl1-mesa-dev libgl1-mesa-dev \
            mesa-common-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage Linux/macOS binary
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/metadata-cleaner ${{ matrix.artifact }}
      - name: Stage Windows binary
        if: matrix.os == 'windows-latest'
        run: |
          copy target\${{ matrix.target }}\release\metadata-cleaner.exe ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
